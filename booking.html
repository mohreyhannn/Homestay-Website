<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Booking Kamar</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-5">

<h2 id="namaKamar">Nama Kamar</h2>
<p id="hargaKamar">Harga Kamar</p>

<!-- 📅 CALENDAR -->
<label for="tanggal">Pilih Tanggal</label>
<input type="text" id="tanggal" class="form-control mb-3">

<p>Total Malam: <span id="totalMalam">0</span></p>
<p>Total Harga: <span id="totalHarga">Rp 0</span></p>

<!-- 💳 PAYMENT -->
<h5>Metode Pembayaran</h5>

<label><input type="radio" name="payment" value="Cash"> Cash</label>
<label><input type="radio" name="payment" value="Transfer"> Transfer</label>

<div id="transferOptions" style="display:none;">
  <label><input type="radio" name="bank" value="BCA"> BCA</label>
  <label><input type="radio" name="bank" value="BNI"> BNI</label>
</div>

<button id="btnPesan" class="btn btn-success mt-3">
  Bayar Sekarang
</button>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://app.sandbox.midtrans.com/snap/snap.js"
data-clinet-key="YOUR_CLIENT_KEY"></script>
<script src="js/booking.js"></script>

</body>
</html>
