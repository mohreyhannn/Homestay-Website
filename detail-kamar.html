<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Homestay Nyaman</title>

    <link rel="stylesheet" href="css/detail-kamar.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_green.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>

  <body>
    <section class="detail-section">
      <div class="container">
        <div class="row g-5">
          <!-- KIRI -->
          <div class="col-lg-7">
            <!-- GALERI -->
            <div class="gallery mb-4">
              <img
                id="gambarKamar"
                class="gallery-main"
                src=""
                alt="Gambar Kamar"
              />

              <div class="gallery-thumb">
                <img src="images/kamar1.jpeg" alt="kamar1" />
                <img src="images/kamar2.jpeg" alt="kamar2" />
                <img src="images/kamar3.jpeg" alt="kamar3" />
                <img src="images/kamar1.jpeg" alt="kamar1" />
              </div>
            </div>

            <!-- REVIEW PENGUNJUNG -->
            <div class="review-section">
              <h3 class="review-title mb-4">Review Pengunjung</h3>

              <div class="row g-3">
                <div class="col-md-4">
                  <div class="review-card">
                    <div class="review-header">
                      <div class="avatar">A</div>

                      <div>
                        <b>Andi</b>
                        <div class="stars">★★★★★</div>
                      </div>
                    </div>

                    <p>Tempatnya sangat nyaman dan bersih.</p>
                  </div>
                </div>

                <div class="col-md-4">
                  <div class="review-card">
                    <div class="review-header">
                      <div class="avatar">S</div>

                      <div>
                        <b>Siti</b>
                        <div class="stars">★★★★★</div>
                      </div>
                    </div>

                    <p>Pelayanan ramah dan lokasi strategis.</p>
                  </div>
                </div>

                <div class="col-md-4">
                  <div class="review-card">
                    <div class="review-header">
                      <div class="avatar">B</div>

                      <div>
                        <b>Budi</b>
                        <div class="stars">★★★★★</div>
                      </div>
                    </div>

                    <p>Homestay terbaik untuk keluarga.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- KANAN -->
          <div class="col-lg-5">
            <div class="detail-card">
              <span class="badge-kamar">Best Choice</span>

              <h1 id="namaKamar" class="kamar-title">Detail Kamar</h1>

              <div class="rating-box">
                <div class="stars">★★★★★</div>
                <span class="rating-text">4.9 • 120 review</span>
              </div>

              <div class="harga-box">
                <span id="hargaKamar" class="harga"></span>
                <span class="per">/ malam</span>
              </div>

              <h5 class="mt-4">Fasilitas</h5>

              <ul id="fasilitasKamar" class="fasilitas-list"></ul>

              <div class="btn-area mt-4">
  <button id="btnBooking" class="btn btn-primary w-100">
    Booking Sekarang
  </button>
</div>

                <<a href="index.html" class="btn btn-outline-secondary">
                  Kembali
                </a>
            </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="js/detail-kamar.js"></script>
    <script src="https://app.sandbox.midtrans.com/snap/snap.js"></script>
  </body>
</html>
