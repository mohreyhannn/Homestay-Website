<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Homestay Nyaman</title>

    <link rel="stylesheet" href="{{url_for('static', filename='css/detail-kamar.css') }}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_green.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>
  </head>

  <body>
    <section class="detail-section">
      <div class="container">
        <div class="row g-5">
          <!-- KIRI -->
          <div class="col-lg-7">
            <!-- GALERI -->
            <div class="gallery mb-4">
             <img
  id="gambarKamar"
  class="gallery-main"
  src="{{ url_for('static', filename='images/kamar2.jpeg') }}"
  alt="Gambar Kamar"
/>

              <div class="gallery-thumb">
                <img src="{{ url_for('static', filename='images/kamar1.jpeg') }}" alt="kamar1" />
                <img src="{{ url_for('static', filename='images/kamar2.jpeg') }}" alt="kamar2" />
                <img src="{{ url_for('static', filename='images/kamar3.jpeg') }}" alt="kamar3" />
                <img src="{{ url_for('static', filename='images/kamar1.jpeg') }}" alt="kamar1" />
              </div>
            </div>

            <!-- REVIEW PENGUNJUNG -->
            <div class="review-section">
              <h3 class="review-title mb-4">Review Pengunjung</h3>

              <div class="room-review-scroll" id="roomReviewList"></div>
              <div class="room-review-form mt-4">
  <h5>Tulis Review Kamar</h5>

  <input
    type="text"
    id="roomReviewName"
    placeholder="Nama Anda"
    class="form-control mb-2"
  />

  <textarea
    id="roomReviewText"
    rows="3"
    placeholder="Tulis pengalaman Anda..."
    class="form-control mb-2"
  ></textarea>

  <div class="room-rating-input mb-3">
    <i class="fa fa-star" data-value="1"></i>
    <i class="fa fa-star" data-value="2"></i>
    <i class="fa fa-star" data-value="3"></i>
    <i class="fa fa-star" data-value="4"></i>
    <i class="fa fa-star" data-value="5"></i>
  </div>

  <button id="sendRoomReview" type="button" class="btn btn-primary">
    Kirim Review
  </button>
</div>
            </div>
          </div>

          <!-- KANAN -->
          <div class="col-lg-5">
            <div class="detail-card">
              <span class="badge-kamar">Best Choice</span>

              <h1 id="namaKamar" class="kamar-title">Detail Kamar</h1>

              <div class="rating-box">
                <div class="stars">★★★★★</div>
                <span id="ratingText" class="rating-text">Belum ada review</span>
              </div>

              <div class="harga-box">
                <span id="hargaKamar" class="harga"></span>
                <span class="per">/ malam</span>
              </div>

              <h5 class="mt-4">Fasilitas</h5>

              <ul id="fasilitasKamar" class="fasilitas-list"></ul>

              <div class="detail-actions mt-4">
  <button id="btnBooking" class="btn-booking">
    Booking Sekarang
  </button>

  <a href="{{ url_for('home') }}#kamar" class="btn-back">
    Kembali
  </a>
</div>
            </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div id="appToast"></div>

    <script src="{{ url_for('static', filename='js/notification.js') }}"></script>
<script src="{{ url_for('static', filename='js/detail-kamar.js') }}"></script>
<script src="https://app.sandbox.midtrans.com/snap/snap.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
